joeys:
  stage_requirement: 1
  progressions_required: 3
  sv_url: "https://scoutsvictoria.com.au/activities-events/outdoor-adventure-skills/"
  core_skills:
    - { name: "Camping", stage: 1, description: "Campcraft, hygiene, cooking, and shelter management in remote environments." }
    - { name: "Bushcraft", stage: 1, description: "Pioneering, survival skills, fire lighting, and minimal impact practices." }
    - { name: "Bushwalking", stage: 1, description: "Navigation, route planning, and leading expeditions through diverse terrain." }
  specialist_skills:
    - { name: "Alpine", stage: 1, description: "Cross-country skiing, downhill skiing, snowboarding, and snow survival." }
    - { name: "Cycling", stage: 1, description: "Mountain biking and cycle touring, including maintenance and route planning." }
    - { name: "Vertical", stage: 1, description: "Abseiling, rock climbing, and caving techniques and safety systems." }
    - { name: "Snorkeling", stage: 1, description: "Snorkeling and SCUBA diving skills, marine environments, and safety." }
    - { name: "Paddling", stage: 1, description: "Canoeing, kayaking, and sea kayaking across flatwater and whitewater." }
    - { name: "Boating", stage: 1, description: "Sailing and powerboating, including navigation and seamanship." }

