areas:
  - { name: "STEM & Innovation", icon: "psychology", description: "Explore science, technology, engineering, and mathematics. Develop innovative solutions to problems or learn new technical skills." }
  - { name: "Environment", icon: "forest", description: "Projects focused on sustainability, conservation, and understanding the natural world around us." }
  - { name: "Creative Flare", icon: "brush", description: "Express yourself through arts, performance, design, or literature. Push your creative boundaries." }
  - { name: "Growth & Development", icon: "psychology", description: "Personal challenges aimed at improving physical or mental well-being, learning a new language, or developing life skills." }
  - { name: "Better World", icon: "public", description: "Community service, advocacy, and projects that actively contribute to peace, justice, and social equity." }
  - { name: "Adventure & Sport", icon: "directions_run", description: "Pursuits involving physical exertion, skill, and often risk, in an outdoor or sporting environment." }

intro:
  heading: "Requirements"
  paragraphs:
    - "Special Interest Areas encourage Scouts to try new things and pursue existing interests. Scouts set their own goals in one of the six Special Interest Areas, enabling them to design a project that interests and challenges them personally."

