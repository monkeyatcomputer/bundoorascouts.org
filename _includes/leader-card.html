<!-- Leader Card Include -->
<!-- Usage: include leader-card.html person=person colour=section.colour -->
{% assign p = include.person %}
{% assign c = include.colour | default: "#3f5e94" %}

<div
  class="bg-surface-container-lowest p-6 rounded-xl hover:shadow-xl transition-all border-b-4 h-full flex flex-col items-center text-center"
  style="border-color: {{ c }};">
  <div class="w-20 h-20 rounded-full overflow-hidden mb-6 bg-surface-container-high shadow-sm flex-shrink-0">
    <img src="/assets/images/people/{{ p.title | downcase }}.jpg" alt="{{ p.title }}" class="w-full h-full object-cover"
      onerror="this.src='/assets/images/people/nophoto.jpg'">
  </div>
  <div class="flex-grow">
    <h3 class="font-bold text-primary text-lg leading-tight mb-1">
      {{ p.title }}
      {% if p.alias and p.alias != "" %}
      <span class="block text-sm text-secondary font-medium italic">"{{ p.alias }}"</span>
      {% endif %}
    </h3>
    <p class="font-bold text-xs uppercase tracking-wider mb-2" style="color: {{ c }};">{{ p.role }}</p>
  </div>
</div>
