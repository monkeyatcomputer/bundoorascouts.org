<!-- Leader Card Include -->
<!-- Usage: include leader-card.html person=person colour=section.colour -->
{% assign p = include.person %}
{% assign c = include.colour | default: "#3f5e94" %}

<a href="{{ p.url | relative_url }}" aria-label="View {{ p.name }}'s profile"
  class="group bg-surface-container-lowest p-6 rounded-xl hover:shadow-xl transition-all border-b-4 h-full flex flex-col items-center text-center focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-secondary/40"
  style="border-color: {{ c }};">
  <div class="w-40 h-40 rounded-full overflow-hidden mb-6 bg-surface-container-high shadow-sm flex-shrink-0">
    <img src="/assets/images/people/{{ p.name | downcase }}.jpg" alt="{{ p.name }}" width="320" height="320"
      loading="lazy" decoding="async" class="w-full h-full object-cover transition-transform group-hover:scale-105"
      onerror="this.onerror=null;this.src='/assets/images/logo.png'">
  </div>
  <div class="flex-grow">
    <h3 class="font-bold text-primary text-lg leading-tight mb-1 transition-colors group-hover:text-secondary">
      {{ p.name }}
      {% if p.alias and p.alias != "" %}
      <span class="block text-sm text-secondary font-medium italic">"{{ p.alias }}"</span>
      {% endif %}
    </h3>
    <p class="font-bold text-xs uppercase tracking-wider mb-2" style="color: {{ c }};">{{ p.role }}</p>
  </div>
</a>
