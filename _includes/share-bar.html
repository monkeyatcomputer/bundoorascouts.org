<!-- Horizontal Share Bar -->
<div class="mt-16 py-8 border-y border-outline-variant w-full">
  <div class="flex flex-col lg:flex-row items-center justify-between gap-8">
    <div>
      <h4 class="text-xl font-bold text-primary mb-1">Spread the word</h4>
      <p class="text-on-surface-variant text-sm">Enjoyed this story? Share it with your troop.</p>
    </div>

    <div class="flex flex-wrap items-center gap-3">
      <!-- Facebook -->
      <a href="https://www.facebook.com/sharer/sharer.php?u={{ site.url | url_encode }}{{ page.url | url_encode }}"
        target="_blank" rel="noopener"
        class="flex items-center gap-2 px-4 h-10 bg-[#1877F2] text-white rounded-xl font-bold text-xs hover:opacity-90 transition-all shadow-sm">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
          <path
            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
        </svg>
        <span>Facebook</span>
      </a>

      <!-- X (Twitter) -->
      <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ site.url | url_encode }}{{ page.url | url_encode }}"
        target="_blank" rel="noopener"
        class="flex items-center gap-2 px-4 h-10 bg-black text-white rounded-xl font-bold text-xs hover:opacity-90 transition-all shadow-sm">
        <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24">
          <path
            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
        </svg>
        <span>Post to X</span>
      </a>

      <!-- Bluesky -->
      <a href="https://bsky.app/intent/compose?text={{ page.title | url_encode }}%20{{ site.url | url_encode }}{{ page.url | url_encode }}"
        target="_blank" rel="noopener"
        class="flex items-center gap-2 px-4 h-10 bg-[#0085ff] text-white rounded-xl font-bold text-xs hover:opacity-90 transition-all shadow-sm">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16">
          <path d="M3.468 1.948C5.303 3.325 7.276 6.118 8 7.616c.725-1.498 2.698-4.29 4.532-5.668C13.855.955 16 .186 16 2.632c0 .489-.28 4.105-.444 4.692-.572 2.04-2.653 2.561-4.504 2.246 3.236.551 4.06 2.375 2.281 4.2-3.376 3.464-4.852-.87-5.23-1.98-.07-.204-.103-.3-.103-.218 0-.081-.033.014-.102.218-.379 1.11-1.855 5.444-5.231 1.98-1.778-1.825-.955-3.65 2.28-4.2-1.85.315-3.932-.205-4.503-2.246C.28 6.737 0 3.12 0 2.632 0 .186 2.145.955 3.468 1.948"/>
        </svg>
        <span>Bluesky</span>
      </a>

      <!-- Mastodon -->
      <a href="https://share.joinmastodon.org/?text={{ page.title | url_encode }}%20{{ site.url | url_encode }}{{ page.url | url_encode }}"
        target="_blank" rel="noopener"
        class="flex items-center gap-2 px-4 h-10 bg-[#5c5edc] text-white rounded-xl font-bold text-xs hover:opacity-90 transition-all shadow-sm">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 16 16">
          <path d="M11.19 12.195c2.016-.24 3.77-1.475 3.99-2.603.348-1.778.32-4.339.32-4.339 0-3.47-2.286-4.488-2.286-4.488C12.062.238 10.083.017 8.027 0h-.05C5.92.017 3.942.238 2.79.765c0 0-2.285 1.017-2.285 4.488l-.002.662c-.004.64-.007 1.35.011 2.091.083 3.394.626 6.74 3.78 7.57 1.454.383 2.703.463 3.709.408 1.823-.1 2.847-.647 2.847-.647l-.06-1.317s-1.303.41-2.767.36c-1.45-.05-2.98-.156-3.215-1.928a4 4 0 0 1-.033-.496s1.424.346 3.228.428c1.103.05 2.137-.064 3.188-.189zm1.613-2.47H11.13v-4.08c0-.859-.364-1.295-1.091-1.295-.804 0-1.207.517-1.207 1.541v2.233H7.168V5.89c0-1.024-.403-1.541-1.207-1.541-.727 0-1.091.436-1.091 1.296v4.079H3.197V5.522q0-1.288.66-2.046c.456-.505 1.052-.764 1.793-.764.856 0 1.504.328 1.933.983L8 4.39l.417-.695c.429-.655 1.077-.983 1.934-.983.74 0 1.336.259 1.791.764q.662.757.661 2.046z"/>
        </svg>
        <span>Mastodon</span>
      </a>

      <!-- Email -->
      <a href="mailto:?subject={{ page.title | url_encode }}&body=Check out this story from Bundoora Scouts: {{ site.url }}{{ page.url }}"
        class="flex items-center gap-2 px-4 h-10 bg-secondary text-white rounded-xl font-bold text-xs hover:opacity-90 transition-all shadow-sm">
        <span class="material-symbols-outlined text-sm">mail</span>
        <span>Email</span>
      </a>

      <!-- Copy Link -->
      <button id="copy-link-btn" data-url="{{ site.url }}{{ page.url }}"
        class="flex items-center gap-2 px-4 h-10 bg-white text-primary border border-outline-variant rounded-xl font-bold text-xs hover:border-primary transition-all shadow-sm">
        <span class="material-symbols-outlined text-sm">link</span>
        <span id="copy-btn-text">Copy Link</span>
      </button>
    </div>
  </div>
</div>
<script>
  // Copy to Clipboard
  document.getElementById('copy-link-btn')?.addEventListener('click', function () {
    const url = this.getAttribute('data-url');
    const text = document.getElementById('copy-btn-text');

    navigator.clipboard.writeText(url).then(() => {
      const originalText = text.innerText;
      text.innerText = 'Copied!';
      setTimeout(() => { text.innerText = originalText; }, 2000);
    });
  });
</script>
