<!-- Post Navigation -->
<nav class="my-16 flex flex-col sm:flex-row gap-6 border-t border-b border-outline-variant/10 py-12">
  <div class="flex-1">
    {% if page.previous %}
    <a href="{{ page.previous.url }}"
      class="group flex flex-col gap-3 p-6 bg-surface-container-low rounded-2xl hover:bg-secondary-container transition-all shadow-sm">
      <span class="flex items-center gap-2 text-xs font-black text-secondary uppercase tracking-tighter">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Previous Adventure
      </span>
      <span
        class="text-xl font-bold text-primary leading-tight group-hover:text-primary transition-colors line-clamp-2">
        {{ page.previous.title }}
      </span>
    </a>
    {% endif %}
  </div>

  <div class="flex-1 text-right">
    {% if page.next %}
    <a href="{{ page.next.url }}"
      class="group flex flex-col gap-3 p-6 bg-surface-container-low rounded-2xl hover:bg-secondary-container transition-all shadow-sm items-end">
      <span class="flex items-center gap-2 text-xs font-black text-secondary uppercase tracking-tighter">
        Next Adventure
        <span class="material-symbols-outlined text-sm">arrow_forward</span>
      </span>
      <span
        class="text-xl font-bold text-primary leading-tight group-hover:text-primary transition-colors line-clamp-2">
        {{ page.next.title }}
      </span>
    </a>
    {% endif %}
  </div>
</nav>
