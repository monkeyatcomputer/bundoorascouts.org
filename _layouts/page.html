---
layout: default
---

<!-- Page Hero Section -->
<section class="relative w-full min-h-[400px] flex items-center bg-primary-container overflow-hidden">
  <div class="absolute inset-0 z-0">
    {% if page.hero_image %}
      <img src="{{ page.hero_image }}" alt="{{ page.title }}" class="w-full h-full object-cover opacity-40 mix-blend-multiply"/>
    {% else %}
      <div class="w-full h-full bg-gradient-to-br from-primary to-primary-container"></div>
    {% endif %}
    <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
  </div>
  
  <div class="relative z-10 max-w-7xl mx-auto px-6 w-full pt-48 pb-24 md:pt-60 md:pb-32 text-center md:text-left">
    <div class="max-w-3xl">
      <h1 class="text-4xl md:text-6xl font-bold font-headline text-on-primary mb-6 leading-tight tracking-tight">
        {{ page.title }}
      </h1>
      {% if page.description %}
      <p class="text-xl text-primary-fixed-dim leading-relaxed font-body">
        {{ page.description }}
      </p>
      {% endif %}
    </div>
  </div>
</section>

<!-- Page Content -->
<div class="max-w-7xl mx-auto px-6 md:px-12 py-20">
  <div class="prose prose-lg max-w-none text-on-surface leading-relaxed">
    {{ content }}
  </div>
</div>
