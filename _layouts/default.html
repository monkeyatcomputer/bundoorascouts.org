<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} – Bundoora Scouts{% else %}Bundoora Scouts – The Modern Trailfinder{% endif
    %}</title>
  <meta name="description"
    content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}" />

  <!-- Favicons and App Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
  <link rel="manifest" href="/assets/images/site.webmanifest">
  <link rel="mask-icon" href="/assets/images/safari-pinned-tab.svg" color="#3f5e94">
  <link rel="shortcut icon" href="/favicon.ico">
  <meta name="msapplication-TileColor" content="#100e4c">
  <meta name="msapplication-config" content="/assets/images/browserconfig.xml">
  <meta name="theme-color" content="#ffffff">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}Bundoora Scouts{% endif %}" />
  <meta property="og:description"
    content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  {% if page.image %}
  <meta property="og:image" content="{{ page.image | absolute_url }}" />{% endif %}

  <!-- Google Fonts: Nunito Sans + Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet" />

  <!-- GSAP for premium animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

  <!-- Tailwind CSS -->
  <link href="/assets/css/app.css" rel="stylesheet">

  {% seo %}
</head>

<body
  class="bg-surface text-on-surface antialiased selection:bg-secondary-container selection:text-on-secondary-container min-h-screen flex flex-col">

  {% include nav.html %}

  <main class="flex-grow">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    window.addEventListener('load', () => {
      // Initialize GSAP Plugins
      gsap.registerPlugin(ScrollTrigger);

      // Global reveal animation for elements with [data-gsap="reveal"]
      document.querySelectorAll('[data-gsap="reveal"]').forEach((el) => {
        gsap.from(el, {
          scrollTrigger: {
            trigger: el,
            start: "top 85%",
            toggleActions: "play none none none"
          },
          y: 30,
          opacity: 0,
          duration: 1,
          ease: "power3.out",
          delay: el.dataset.delay || 0
        });
      });


      // Markdown Alert Transformation
      const alertConfigs = {
        'NOTE': { class: 'note', icon: 'info' },
        'TIP': { class: 'tip', icon: 'lightbulb' },
        'IMPORTANT': { class: 'important', icon: 'priority_high' },
        'WARNING': { class: 'warning', icon: 'warning' },
        'CAUTION': { class: 'caution', icon: 'dangerous' }
      };

      document.querySelectorAll('blockquote').forEach(bq => {
        const firstP = bq.querySelector('p:first-child');
        if (!firstP) return;

        const match = firstP.innerHTML.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/);
        if (match) {
          const type = match[1];
          const config = alertConfigs[type];

          bq.classList.add('markdown-alert', `markdown-alert-${config.class}`);

          if (type !== 'IMPORTANT') {
            const header = document.createElement('p');
            header.classList.add('markdown-alert-title');
            header.innerHTML = `<span class="material-symbols-outlined">${config.icon}</span>${type}`;
            bq.insertBefore(header, firstP);
          }

          firstP.innerHTML = firstP.innerHTML.replace(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/, '');
        }
      });
    });
  </script>
</body>

</html>
